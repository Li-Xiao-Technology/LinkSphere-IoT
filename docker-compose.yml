version: '3.8'

services:
  backend:
    build: ./backend
    container_name: linksphere-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET environment variable is required.}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY environment variable is required.}
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/iot_platform.db}
      - DB_PROVIDER=${DB_PROVIDER:-sqlite}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:3001/api}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_API_URL=${AI_API_URL:-}
    volumes:
      - backend-data:/app/data
    networks:
      - linksphere-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: linksphere-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_SOCKET_URL=${REACT_APP_SOCKET_URL:-}
    networks:
      - linksphere-network
    restart: unless-stopped

networks:
  linksphere-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
